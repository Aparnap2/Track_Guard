<div id="command-chat-panel" class="flex flex-col h-80 bg-white rounded-xl shadow-sm">
    <div class="px-4 py-3 border-b border-gray-100">
        <h3 class="font-semibold text-sm">Agent Chat</h3>
        <p class="text-xs text-gray-400">Multi-agent conversation</p>
    </div>
    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-2 text-sm">
        <div class="text-center text-xs text-gray-400 py-4">
            <span>Connecting to event stream...</span>
        </div>
    </div>
    <form id="chat-form" class="border-t border-gray-100 p-3 flex gap-2"
          hx-post="/api/command/chat/send"
          hx-trigger="submit"
          hx-swap="none"
          _="on htmx:afterRequest reset() me">
        <select name="mention" class="text-xs border border-gray-200 rounded px-2 py-1.5 bg-white">
            <option value="@all">@all</option>
            <option value="@sarthi">@sarthi</option>
            <option value="@finance">@finance</option>
            <option value="@data">@data</option>
            <option value="@ops">@ops</option>
        </select>
        <input type="text" name="message" placeholder="Type a message..."
               class="flex-1 text-xs border border-gray-200 rounded px-3 py-1.5 focus:outline-none focus:border-indigo-400"
               required>
        <button type="submit"
                class="text-xs px-3 py-1.5 bg-indigo-600 text-white rounded hover:bg-indigo-700 font-medium">
            Send
        </button>
    </form>
</div>
<script>
(function() {
    const messagesEl = document.getElementById('chat-messages');
    if (!messagesEl) return;

    const evtSource = new EventSource('/api/command/events');

    evtSource.addEventListener('connected', function(e) {
        const data = JSON.parse(e.data);
        appendMessage('system', 'Connected to command center');
    });

    evtSource.addEventListener('chat', function(e) {
        try {
            const data = JSON.parse(e.data);
            appendMessage(data.sender || 'agent', data.text || '');
        } catch(err) {
            console.error('Failed to parse chat event:', err);
        }
    });

    evtSource.addEventListener('heartbeat', function(e) {
        // keep-alive, no UI update needed
    });

    evtSource.addEventListener('system', function(e) {
        try {
            const data = JSON.parse(e.data);
            appendMessage('system', data.text || '');
        } catch(err) {
            console.error('Failed to parse system event:', err);
        }
    });

    evtSource.onerror = function() {
        appendMessage('system', '⚠️ Connection lost. Reconnecting...');
    };

    function appendMessage(sender, text) {
        const div = document.createElement('div');
        div.className = 'flex gap-2';

        const now = new Date();
        const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

        if (sender === 'system') {
            div.innerHTML = '<div class="text-xs text-gray-400 italic w-full text-center">' + text + '</div>';
        } else {
            const colors = {
                'sarthi': 'bg-blue-100 text-blue-800',
                'finance': 'bg-green-100 text-green-800',
                'data': 'bg-purple-100 text-purple-800',
                'ops': 'bg-yellow-100 text-yellow-800',
            };
            const colorClass = colors[sender] || 'bg-gray-100 text-gray-800';
            const initial = sender.charAt(0).toUpperCase();
            div.innerHTML = '<div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ' + colorClass + ' flex-shrink-0">' + initial + '</div>' +
                '<div class="flex-1"><div class="flex items-baseline gap-2"><span class="text-xs font-semibold">' + sender + '</span><span class="text-[10px] text-gray-400">' + time + '</span></div>' +
                '<p class="text-xs text-gray-700">' + text + '</p></div>';
        }

        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Handle HTMX form submissions - the chat form uses hx-post which will send
    // the message to the server. On success, the server returns JSON which we
    // can handle via htmx events.
    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if (evt.detail.requestConfig.path === '/api/command/chat/send') {
            if (evt.detail.successful) {
                try {
                    const data = JSON.parse(evt.detail.xhr.responseText);
                    const sender = data.mention || 'founder';
                    const text = data.message || '';
                    appendMessage(sender.replace('@',''), text);
                } catch(e) {
                    // response wasn't JSON, ignore
                }
            }
        }
    });
})();
</script>
