<div id="command-chat-panel" class="flex flex-col h-[28rem] fade-in">
    <!-- Chat Header -->
    <div class="flex items-center justify-between px-4 py-3 rounded-t-lg" style="border-bottom:1px solid var(--border);background:var(--bg-card)">
        <div class="flex items-center gap-2">
            <h3 class="font-semibold text-sm flex items-center gap-1.5" style="color:var(--text)">
                Agent Chat
                <span class="tooltip-trigger relative" data-tip="Talk to your AI agents with @mentions">
                    <svg class="w-3.5 h-3.5 cursor-help" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color:var(--text-muted)"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </span>
            </h3>
            <span class="flex items-center gap-1 text-[10px]" style="color:var(--text-muted)">
                <span id="chat-conn-status" class="status-dot connecting"></span>
                <span id="chat-conn-label">Connecting...</span>
            </span>
        </div>
        <div class="flex items-center gap-2 text-[10px]" style="color:var(--text-muted)">
            <span class="agent-pill agent-sarthi" style="font-size:10px">Sarthi</span>
            <span class="agent-pill agent-finance" style="font-size:10px">Finance</span>
            <span class="agent-pill agent-data" style="font-size:10px">Data</span>
            <span class="agent-pill agent-ops" style="font-size:10px">Ops</span>
        </div>
    </div>

    <!-- Chat Messages Area — HTMX SSE connected -->
    <div id="chat-messages" class="flex-1 overflow-y-auto p-3 space-y-1 text-sm"
         hx-ext="sse"
         sse-connect="/api/command/chat/events"
         sse-swap="chat"
         hx-swap="beforeend"
         style="background:var(--bg-surface);scroll-behavior:smooth"
         {{if .Messages}}data-initialized="true"{{end}}>
        {{if .Messages}}
            {{range .Messages}}
            <div class="chat-msg flex gap-2 mb-2">
                <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 {{.AgentClass}}">
                    {{.Initial}}
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-baseline gap-2">
                        <span class="text-xs font-semibold" style="color:var(--text)">{{.DisplayName}}</span>
                        <span class="text-[10px]" style="color:var(--text-muted)">{{.Time}}</span>
                    </div>
                    <p class="text-xs mt-0.5" style="color:var(--text-secondary);word-break:break-word">{{.Text}}</p>
                </div>
            </div>
            {{end}}
        {{else}}
        <div class="text-center text-xs py-6" style="color:var(--text-muted)">
            <div class="flex flex-col items-center gap-2">
                <svg class="w-5 h-5 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                <span>Send a message using the chat panel below. Use <strong>@mentions</strong> like <span class="font-mono">@sarthi</span> or <span class="font-mono">@finance</span> to talk to specific agents.</span>
            </div>
        </div>
        {{end}}
    </div>

    <!-- Loading indicator (hidden, shown via hx-indicator) -->
    <div id="chat-loading" class="htmx-indicator flex items-center gap-2 px-3 py-1.5 text-xs" style="color:var(--text-muted);background:var(--bg-surface);border-top:1px solid var(--border)">
        <svg class="animate-spin h-3.5 w-3.5" style="color:var(--accent-blue)" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Sending message...</span>
    </div>

    <!-- Chat Input -->
    <form id="chat-form" class="flex items-end gap-2 p-3 rounded-b-lg" style="border-top:1px solid var(--border);background:var(--bg-card)"
          hx-post="/api/command/chat/send"
          hx-target="#chat-messages"
          hx-swap="beforeend"
          hx-indicator="#chat-loading">
        <select name="mention" class="input-dark text-xs flex-shrink-0 w-auto">
            <option value="@all">@all</option>
            <option value="@sarthi">Sarthi (Manager)</option>
            <option value="@finance">Finance (Analyst)</option>
            <option value="@data">Data (Analyst)</option>
            <option value="@ops">Ops (Analyst)</option>
        </select>
        <input type="text" name="message" placeholder="Type a message..."
               class="input-dark flex-1 min-w-0"
               required
               autocomplete="off">
        <button type="submit" class="btn btn-send px-4 py-2 text-xs flex-shrink-0" style="min-height:44px">
            Send
        </button>
    </form>
</div>

<script>
(function() {
    'use strict';

    /* ── SSE Connection Status → Listen to HTMX SSE lifecycle events ── */
    var chatConnDot = document.getElementById('chat-conn-status');
    var chatConnLabel = document.getElementById('chat-conn-label');
    var chatMessages = document.getElementById('chat-messages');

    function setChatStatus(state) {
        if (chatConnDot) chatConnDot.className = 'status-dot ' + state;
        if (chatConnLabel) {
            var labels = { connected: '✅ Live', disconnected: '❌ Offline', connecting: '⟳ Connecting...' };
            chatConnLabel.textContent = labels[state] || state;
        }
    }

    // HTMX SSE fires these custom events on the element
    document.addEventListener('htmx:sseOpen', function(evt) {
        if (evt.detail && evt.detail.elt === chatMessages) {
            setChatStatus('connected');
        }
    });

    document.addEventListener('htmx:sseError', function(evt) {
        if (evt.detail && evt.detail.elt === chatMessages) {
            setChatStatus('disconnected');
        }
    });

    /* ── Auto-scroll on new content ── */
    if (chatMessages) {
        var scrollObserver = new MutationObserver(function() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
        scrollObserver.observe(chatMessages, { childList: true, subtree: true });
    }

    /* ── Clear input after successful send ── */
    document.addEventListener('htmx:afterRequest', function(evt) {
        var path = evt.detail.requestConfig && evt.detail.requestConfig.path;
        if (path && path.endsWith('/api/command/chat/send') && evt.detail.successful) {
            var form = document.getElementById('chat-form');
            if (form) {
                var input = form.querySelector('input[name="message"]');
                if (input) input.value = '';
            }
        }
    });

    /* ── After SSE swap, if we get connected event data (JSON), handle it ── */
    // HTMX won't swap JSON into beforeend cleanly, so we use a hidden listener
    // The connected event is handled via the htmx:sseOpen event above.
})();
</script>
