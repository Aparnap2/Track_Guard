<div class="grid grid-cols-2 gap-3">
{{range .Metrics}}
    <div class="p-3 bg-white rounded-lg shadow-sm">
        <div class="text-xs text-gray-500">{{.Label}}</div>
        <div class="text-lg font-bold">{{.Value}}</div>
        <span class="text-xs px-1.5 py-0.5 rounded {{if eq .Pill "GOOD"}}bg-green-100 text-green-700{{else if eq .Pill "OK"}}bg-blue-100 text-blue-700{{else if eq .Pill "LOW"}}bg-yellow-100 text-yellow-700{{else}}bg-gray-100 text-gray-700{{end}}">{{.Pill}}</span>
    </div>
{{end}}
</div>
