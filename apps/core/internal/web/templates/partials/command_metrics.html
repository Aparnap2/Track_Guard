<div class="fade-in">
    <h3 class="font-semibold text-sm md:text-base mb-3">Performance</h3>
    <div class="grid grid-cols-2 gap-3">
    {{range .Metrics}}
        <div class="p-3 rounded-lg transition-all duration-200" style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04)">
            <div class="text-xs" style="color:var(--text-muted)">{{.Label}}</div>
            <div class="text-lg font-bold metric-value mt-0.5" style="color:var(--text)">{{.Value}}</div>
            <span class="inline-block text-[10px] px-1.5 py-0.5 rounded font-medium mt-1
                {{if eq .Pill "GOOD"}}bg-green-900/30 text-green-400
                {{else if eq .Pill "OK"}}bg-blue-900/30 text-blue-400
                {{else if eq .Pill "LOW"}}bg-yellow-900/30 text-yellow-400
                {{else if eq .Pill "SAFE"}}bg-cyan-900/30 text-cyan-400
                {{else}}bg-gray-700/30 text-gray-400{{end}}">{{.Pill}}</span>
        </div>
    {{end}}
    </div>
</div>
