<div class="space-y-2 fade-in">
{{range .Items}}
    <div class="p-3 rounded-lg transition-all duration-200" style="border-left:3px solid {{if eq .Severity "high"}}var(--accent-red){{else if eq .Severity "med"}}var(--accent-yellow){{else}}var(--accent-green){{end}};background:rgba(255,255,255,0.02);">
        <div class="flex items-center justify-between">
            <span class="font-medium text-sm" style="color:var(--text)">{{.Title}}</span>
            <span class="text-[10px] px-2 py-0.5 rounded-full font-medium {{if eq .Severity "high"}}bg-red-900/30 text-red-400{{else if eq .Severity "med"}}bg-yellow-900/30 text-yellow-400{{else}}bg-green-900/30 text-green-400{{end}}">{{if eq .Severity "high"}}High{{else if eq .Severity "med"}}Med{{else}}Low{{end}}</span>
        </div>
        <p class="text-xs mt-1" style="color:var(--text-secondary)">{{.Description}}</p>
    </div>
{{else}}
    <div class="text-xs py-8 text-center" style="color:var(--text-muted)">
        <svg class="w-6 h-6 mx-auto mb-2 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        No items to watch right now — agents will add items here when they detect something
    </div>
{{end}}
</div>
