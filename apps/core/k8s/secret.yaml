---
apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secret
  labels:
    app: api-gateway
    component: server
type: Opaque
stringData:
  # Database connection string
  DATABASE_URL: "postgres://iterateswarm:iterateswarm@postgres:5432/iterateswarm?sslmode=disable"

  # JWT signing secret - CHANGE IN PRODUCTION
  JWT_SECRET: "your-jwt-secret-change-in-production"

  # Slack webhook for notifications - CHANGE IN PRODUCTION
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"

  # Optional: Azure OpenAI credentials (if using Azure)
  # AZURE_OPENAI_ENDPOINT: ""
  # AZURE_OPENAI_API_KEY: ""