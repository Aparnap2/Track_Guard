<div class="flex justify-between items-center mb-4">
  <div>
    <h3 class="text-lg font-bold">Approval queue</h3>
    <p class="text-sm" style="color:var(--muted)">Selection-execution pause for risky actions.</p>
  </div>
</div>
<div class="space-y-3">
  {{range $a := .Items}}
  <div class="p-4 rounded-2xl" style="background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05)" id="approval-{{$a.ID}}">
    <small class="text-xs" style="color:var(--faint)">Pending</small>
    <strong class="block mt-1">{{$a.Title}}</strong>
    <p class="text-sm mt-1" style="color:var(--muted)">{{$a.Description}}</p>
    <div class="flex gap-2 mt-3">
      <button class="px-3 py-1.5 rounded-xl text-xs font-semibold border" style="background:rgba(52,211,153,.1);color:#a7f3d0;border-color:rgba(52,211,153,.2)" 
        hx-post="/api/command/approvals/{{$a.ID}}/approve" hx-target="#approval-{{$a.ID}}" hx-swap="outerHTML" hx-headers='{"HX-Request":"true"}'>Approve</button>
      <button class="px-3 py-1.5 rounded-xl text-xs font-semibold border" style="background:rgba(245,158,11,.1);color:#fcd34d;border-color:rgba(245,158,11,.2)" 
        hx-post="/api/command/approvals/{{$a.ID}}/hold" hx-target="#approval-{{$a.ID}}" hx-swap="outerHTML" hx-headers='{"HX-Request":"true"}'>Hold</button>
    </div>
  </div>
  {{end}}
  {{if not .Items}}
  <div class="text-center py-8 text-sm" style="color:var(--faint)">No pending approvals</div>
  {{end}}
</div>
