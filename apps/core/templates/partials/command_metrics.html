<div class="flex justify-between items-center mb-4">
  <div>
    <h3 class="text-lg font-bold">Operational metrics</h3>
    <p class="text-sm" style="color:var(--muted)">Trust, latency, and reliability.</p>
  </div>
</div>
<div class="space-y-3">
  {{range $m := .Metrics}}
  <div class="flex justify-between items-center p-4 rounded-2xl" style="background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05)">
    <div>
      <small class="text-xs" style="color:var(--faint)">{{$m.Label}}</small>
      <strong class="block text-base mt-0.5">{{$m.Value}}</strong>
    </div>
    <span class="px-3 py-1 rounded-full text-xs font-mono {{if eq $m.Pill "GOOD"}}bg-emerald-900/20 text-emerald-400{{else if eq $m.Pill "OK"}}bg-amber-900/20 text-amber-400{{else}}bg-sky-900/20 text-sky-300{{end}}">{{$m.Pill}}</span>
  </div>
  {{end}}
</div>
