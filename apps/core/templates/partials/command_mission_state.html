<div class="flex justify-between items-center mb-4">
  <div>
    <h3 class="text-lg font-bold">MissionState board</h3>
    <p class="text-sm" style="color:var(--muted)">Compiled operational state across finance, BI, ops.</p>
  </div>
  <span class="px-3 py-1 rounded-full text-xs font-mono" style="background:rgba(52,211,153,.12);color:#a7f3d0">AUTO-COMPILED</span>
</div>
<div class="grid grid-cols-3 gap-3">
  {{range $s := .Signals}}
  <div class="p-4 rounded-2xl" style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06)">
    <small class="uppercase tracking-wider text-xs" style="color:var(--faint)">{{$s.Domain}}</small>
    <strong class="block text-lg mt-1">{{$s.Title}}</strong>
    <p class="text-sm mt-1 {{if eq $s.DeltaClass "warn"}}text-amber-400{{else if eq $s.DeltaClass "down"}}text-rose-400{{else}}text-emerald-400{{end}}">{{$s.Description}}</p>
  </div>
  {{end}}
</div>
<div class="mt-4"><canvas id="missionChart" style="height:180px"></canvas></div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var ctx = document.getElementById('missionChart');
    if (ctx) {
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['W1','W2','W3','W4','W5','W6'],
          datasets: [
            { label: 'Mission Health', data: [92, 88, 85, 82, 78, 74], borderColor: '#7dd3fc', backgroundColor: 'rgba(125,211,252,.1)', fill: true, tension: 0.4, pointRadius: 3 },
            { label: 'Risk Index', data: [22, 28, 30, 35, 40, 42], borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,.1)', fill: true, tension: 0.4, pointRadius: 3 },
            { label: 'Execution Drag', data: [12, 15, 18, 22, 25, 28], borderColor: '#f43f5e', backgroundColor: 'rgba(244,63,94,.1)', fill: true, tension: 0.4, pointRadius: 3 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#9fb0c7', font: { size: 10 } } } },
          scales: {
            x: { ticks: { color: '#6e819b', font: { size: 10 } }, grid: { color: 'rgba(196,214,255,.06)' } },
            y: { ticks: { color: '#6e819b', font: { size: 10 } }, grid: { color: 'rgba(196,214,255,.06)' } }
          }
        }
      });
    }
  });
</script>
