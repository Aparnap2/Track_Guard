<div class="flex gap-6 text-sm flex-wrap" style="color:var(--muted)">
  <span>Mission health <strong style="color:var(--text)" class="font-mono font-semibold">{{.Health}} / 100</strong></span>
  <span>Risk level <strong style="color:var(--text)" class="font-mono font-semibold">{{.RiskLevel}}</strong></span>
  <span>Active blindspots <strong style="color:var(--text)" class="font-mono font-semibold">{{.Blindspots}}</strong></span>
  <span>Pending approvals <strong style="color:var(--text)" class="font-mono font-semibold">{{.Approvals}}</strong></span>
  <span>Last sync <strong style="color:var(--text)" class="font-mono font-semibold">{{.LastSync}}</strong></span>
</div>
