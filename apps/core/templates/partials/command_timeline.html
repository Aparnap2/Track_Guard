<div class="flex justify-between items-center mb-4">
  <div>
    <h3 class="text-lg font-bold">Recent mission events</h3>
    <p class="text-sm" style="color:var(--muted)">Useful for trust and replay.</p>
  </div>
</div>
<div class="space-y-3">
  {{range $e := .Events}}
  <div class="grid grid-cols-[80px_1fr] gap-3 text-sm">
    <time class="font-mono" style="color:var(--faint)">{{$e.Time}}</time>
    <div>
      <strong class="block" style="color:var(--text)">{{$e.Title}}</strong>
      <p style="color:var(--muted)">{{$e.Description}}</p>
    </div>
  </div>
  {{end}}
</div>
