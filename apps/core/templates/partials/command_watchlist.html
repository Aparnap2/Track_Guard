<div class="flex justify-between items-center mb-4">
  <div>
    <h3 class="text-lg font-bold">Guardian watchlist</h3>
    <p class="text-sm" style="color:var(--muted)">High-signal patterns currently in play.</p>
  </div>
</div>
<div class="space-y-3">
  {{range $w := .Items}}
  <div class="p-4 rounded-2xl flex justify-between gap-4" style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06)">
    <div>
      <h4 class="font-semibold">{{$w.Title}}</h4>
      <p class="text-sm mt-1" style="color:var(--muted)">{{$w.Description}}</p>
    </div>
    <span class="px-3 py-1 rounded-full text-xs font-mono h-min whitespace-nowrap {{if eq $w.Severity "high"}}bg-rose-900/20 text-rose-400{{else if eq $w.Severity "med"}}bg-amber-900/20 text-amber-400{{else}}bg-sky-900/20 text-sky-300{{end}}">{{$w.Severity | upper}}</span>
  </div>
  {{end}}
</div>
