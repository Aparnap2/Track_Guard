# ═══════════════════════════════════════════════════════════════
# SARTHI V3.0 — MINIMAL PRODUCTION STACK
# Go Gateway + Python AI Worker + Redis + Postgres + Qdrant + Redpanda
# ═══════════════════════════════════════════════════════════════

version: '3.8'

networks:
  sarthi-v3:
    driver: bridge
    name: sarthi-v3

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  jaeger_data:
  neo4j_data:

services:
  # ── PostgreSQL — Structured Data ─────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sarthi-postgres
    restart: unless-stopped
    networks: 
      - sarthi-v3
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: sarthi
      POSTGRES_PASSWORD: sarthi
      POSTGRES_DB: sarthi
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sarthi -d sarthi"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Redis — Working Memory / Session State ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: sarthi-redis
    restart: unless-stopped
    networks:
      - sarthi-v3
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant — Vector Memory ───────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sarthi-qdrant
    restart: unless-stopped
    networks:
      - sarthi-v3
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant — Vector Memory ───────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: sarthi-qdrant
    restart: unless-stopped
    networks: [sarthi-v3]
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── OTel Collector — Tracing Pipeline ────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector:0.100.0
    container_name: sarthi-otel-collector
    restart: unless-stopped
    networks: [sarthi-v3]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics
    volumes:
      - ./config/otel/collector.yaml:/etc/otelcol/collector.yaml:ro
    command: ["--config", "/etc/otelcol/collector.yaml"]
    depends_on:
      - jaeger

  # ── Neo4j — Semantic Memory (Graph) ─────────────────────────
  neo4j:
    build:
      context: ./docker
      dockerfile: Dockerfile.neo4j-alpine
    container_name: sarthi-neo4j
    restart: unless-stopped
    networks: [sarthi-v3]
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_dbms_memory_heap_initial__size=256m
      - NEO4J_dbms_memory_heap_max__size=512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Jaeger — Tracing Backend ─────────────────────────────
  jaeger:
    build:
      context: ./docker
      dockerfile: Dockerfile.jaeger-alpine
    container_name: sarthi-jaeger
    restart: unless-stopped
    networks: [sarthi-v3]
    ports:
      - "16686:16686"   # UI
      - "14250:14250"   # gRPC
      - "14268:14268"   # HTTP
    volumes:
      - jaeger_data:/var/lib/jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=badger

  # ── Redpanda — Event Bus (Kafka-compatible) ───────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.1
    container_name: sarthi-redpanda
    restart: unless-stopped
    networks: [sarthi-v3]
    command:
      - redpanda
      - start
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,EXTERNAL://localhost:9094
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=redpanda:8082
      - --schema-registry-addr=0.0.0.0:8081
      - --rpc-addr=0.0.0.0:33145
      - --overprovisioned
      - --smp=1
    ports:
      - "9092:9092"
      - "9094:9094"
      - "8081:8081"
      - "8082:8082"
      - "33145:33145"
      - "9644:9644"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9644/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go Gateway — API + HTMX ─────────────────────────────
  gateway:
    build:
      context: ./apps/core
      dockerfile: Dockerfile
    container_name: sarthi-gateway
    restart: unless-stopped
    networks: [sarthi-v3]
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://sarthi:sarthi@postgres:5432/sarthi?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=qdrant:6333
      - REDPANDA_BROKERS=redpanda:9092
      - TEMPORAL_ADDR=temporal:7233
      # OpenTelemetry
      - OTEL_COLLECTOR_HOST=otel-collector
      - OTEL_SERVICE_NAME=api-gateway
    depends_on:
      otel-collector:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  # ── Python AI Worker — Agents + Memory ───────────────────
  ai-worker:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    container_name: sarthi-ai
    restart: unless-stopped
    networks: [sarthi-v3]
    environment:
      - DATABASE_URL=postgres://sarthi:sarthi@postgres:5432/sarthi?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=qdrant:6333
      - REDPANDA_URL=redpanda:9092
      # LLM Provider (one of)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
      # OpenTelemetry
      - OTEL_COLLECTOR_HOST=otel-collector
    depends_on:
      otel-collector:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redpanda:
        condition: service_healthy