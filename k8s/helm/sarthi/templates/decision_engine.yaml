{{- if .Values.decisionEngine.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: decision-engine
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sarthi.labels" . | nindent 4 }}
    app.kubernetes.io/component: decision-engine
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.decisionEngine.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: sarthi
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-engine
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sarthi.labels" . | nindent 4 }}
    app.kubernetes.io/component: decision-engine
spec:
  replicas: {{ .Values.decisionEngine.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: sarthi
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "sarthi.labels" . | nindent 8 }}
        app.kubernetes.io/component: decision-engine
    spec:
      containers:
        - name: decision-engine
          image: {{ .Values.decisionEngine.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.decisionEngine.port }}
              protocol: TCP
          {{- with .Values.decisionEngine.health }}
          livenessProbe:
            httpGet:
              path: {{ .path }}
              port: {{ .port }}
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .path }}
              port: {{ .port }}
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.decisionEngine.resources | nindent 12 }}
          env:
            - name: PORT
              value: "{{ .Values.decisionEngine.port }}"
            - name: OTEL_SERVICE_NAME
              value: "decision-engine"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sarthi-postgres
                  key: uri
                  optional: true
            - name: QDRANT_URL
              value: "http://qdrant:6333"
              optional: true
            - name: REDIS_URL
              value: "redis://:6379"
              optional: true
      restartPolicy: Always
---
{{- end -}}