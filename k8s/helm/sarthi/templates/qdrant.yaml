{{- if .Values.qdrant.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: sarthi-qdrant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sarthi.labels" . | nindent 4 }}
type: Opaque
stringData:
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_API_KEY: ""
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sarthi.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  type: ClusterIP
  ports:
    - port: 6333
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: 6334
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sarthi.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qdrant
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "sarthi.labels" . | nindent 8 }}
        app.kubernetes.io/component: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.12.0
          ports:
            - name: grpc
              containerPort: 6333
              protocol: TCP
            - name: http
              containerPort: 6334
              protocol: TCP
          {{- with .Values.qdrant }}
          resources:
            {{- toYaml .resources | nindent 14 }}
          {{- end }}
          env:
            - name: QDRANT__SERVICE__GRPC_PORT
              value: "6333"
            - name: QDRANT__SERVICE__HTTP_PORT
              value: "6334"
          livenessProbe:
            httpGet:
              path: /health
              port: 6334
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 6334
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
---
{{- end -}}