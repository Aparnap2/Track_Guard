{{- if .Values.redis.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: sarthi-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sarthi.labels" . | nindent 4 }}
type: Opaque
stringData:
  REDIS_URL: "redis://:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sarthi.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sarthi.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "sarthi.labels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          {{- with .Values.redis.master }}
          resources:
            {{- toYaml .resources | nindent 14 }}
          {{- end }}
          command:
            - redis-server
            - --maxmemory
            - 128mb
            - --maxmemory-policy
            - allkeys-lru
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
---
{{- end -}}